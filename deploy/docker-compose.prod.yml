# =============================================================================
# Sub2API 生产级 Docker Compose (含 Caddy 反向代理 + 自动 HTTPS)
# =============================================================================
# 使用方式:
#   1. 修改 Caddyfile 中的域名为你的真实域名
#   2. docker compose -f docker-compose.prod.yml up -d
#   3. 访问: https://your-domain.com
# =============================================================================

services:
  # ===========================================================================
  # Caddy 反向代理 (自动 HTTPS)
  # ===========================================================================
  caddy:
    image: caddy:2-alpine
    container_name: sub2api-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - TZ=Asia/Shanghai
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "caddy", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ===========================================================================
  # Sub2API Application (不直接暴露端口，仅通过 Caddy 访问)
  # ===========================================================================
  sub2api:
    image: sub2api:local
    container_name: sub2api
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    # 不直接暴露端口到宿主机，安全加固
    # ports:
    #   - "${BIND_HOST:-0.0.0.0}:${SERVER_PORT:-8080}:8080"
    volumes:
      - ./data:/app/data
    environment:
      # =======================================================================
      # Auto Setup
      # =======================================================================
      - AUTO_SETUP=true

      # =======================================================================
      # Server Configuration
      # =======================================================================
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=${SERVER_MODE:-release}
      - RUN_MODE=${RUN_MODE:-standard}

      # ⚠️ 生产关键配置：信任 Caddy 反向代理的 X-Forwarded-For
      # 这样日志和限流才能拿到真实客户端 IP
      - SERVER_TRUSTED_PROXIES=${SERVER_TRUSTED_PROXIES:-0.0.0.0/0}

      # =======================================================================
      # Logging Configuration
      # =======================================================================
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_SERVICE_NAME=${LOG_SERVICE_NAME:-sub2api}
      - LOG_ENV=production
      - LOG_CALLER=${LOG_CALLER:-true}
      - LOG_STACKTRACE_LEVEL=${LOG_STACKTRACE_LEVEL:-error}
      - LOG_OUTPUT_TO_STDOUT=true
      - LOG_OUTPUT_TO_FILE=true
      - LOG_OUTPUT_FILE_PATH=
      - LOG_ROTATION_MAX_SIZE_MB=100
      - LOG_ROTATION_MAX_BACKUPS=10
      - LOG_ROTATION_MAX_AGE_DAYS=7
      - LOG_ROTATION_COMPRESS=true
      - LOG_ROTATION_LOCAL_TIME=true

      # =======================================================================
      # Database Configuration (PostgreSQL)
      # =======================================================================
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-sub2api}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DATABASE_DBNAME=${POSTGRES_DB:-sub2api}
      - DATABASE_SSLMODE=disable
      - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-256}
      - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-128}
      - DATABASE_CONN_MAX_LIFETIME_MINUTES=${DATABASE_CONN_MAX_LIFETIME_MINUTES:-30}
      - DATABASE_CONN_MAX_IDLE_TIME_MINUTES=${DATABASE_CONN_MAX_IDLE_TIME_MINUTES:-5}

      # =======================================================================
      # Redis Configuration
      # =======================================================================
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-4096}
      - REDIS_MIN_IDLE_CONNS=${REDIS_MIN_IDLE_CONNS:-256}
      - REDIS_ENABLE_TLS=${REDIS_ENABLE_TLS:-false}

      # =======================================================================
      # Admin Account
      # =======================================================================
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@sub2api.local}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required for production}

      # =======================================================================
      # JWT Configuration
      # =======================================================================
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_EXPIRE_HOUR=${JWT_EXPIRE_HOUR:-24}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-0}

      # =======================================================================
      # TOTP (2FA) Configuration
      # =======================================================================
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:-}

      # =======================================================================
      # Timezone
      # =======================================================================
      - TZ=Asia/Shanghai

      # =======================================================================
      # Gemini OAuth (optional)
      # =======================================================================
      - GEMINI_OAUTH_CLIENT_ID=${GEMINI_OAUTH_CLIENT_ID:-}
      - GEMINI_OAUTH_CLIENT_SECRET=${GEMINI_OAUTH_CLIENT_SECRET:-}
      - GEMINI_OAUTH_SCOPES=${GEMINI_OAUTH_SCOPES:-}
      - GEMINI_QUOTA_POLICY=${GEMINI_QUOTA_POLICY:-}
      - GEMINI_CLI_OAUTH_CLIENT_SECRET=${GEMINI_CLI_OAUTH_CLIENT_SECRET:-}
      - ANTIGRAVITY_OAUTH_CLIENT_SECRET=${ANTIGRAVITY_OAUTH_CLIENT_SECRET:-}
      - ANTIGRAVITY_USER_AGENT_VERSION=${ANTIGRAVITY_USER_AGENT_VERSION:-}

      # =======================================================================
      # Security Configuration (生产环境)
      # =======================================================================
      # 关闭 URL 白名单（国内代理场景下 URL 多变）
      - SECURITY_URL_ALLOWLIST_ENABLED=${SECURITY_URL_ALLOWLIST_ENABLED:-false}
      - SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP=${SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP:-false}
      - SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS=${SECURITY_URL_ALLOWLIST_ALLOW_PRIVATE_HOSTS:-true}

      # =======================================================================
      # 固定节点分发核心配置
      # =======================================================================
      - GATEWAY_CONNECTION_POOL_ISOLATION=account_proxy
      - GATEWAY_SCHEDULING_STICKY_SESSION_MAX_WAITING=3
      - GATEWAY_SCHEDULING_STICKY_SESSION_WAIT_TIMEOUT=120s
      - GATEWAY_SCHEDULING_FALLBACK_WAIT_TIMEOUT=30s
      - GATEWAY_SCHEDULING_FALLBACK_MAX_WAITING=100
      - GATEWAY_SCHEDULING_LOAD_BATCH_ENABLED=true
      - GATEWAY_SCHEDULING_SLOT_CLEANUP_INTERVAL=30s
      - GATEWAY_SCHEDULING_DB_FALLBACK_ENABLED=true
      - GATEWAY_SCHEDULING_FULL_REBUILD_INTERVAL_SECONDS=300

      # =======================================================================
      # OpenAI HTTP/2 配置
      # =======================================================================
      - GATEWAY_OPENAI_RESPONSE_HEADER_TIMEOUT=0
      - GATEWAY_OPENAI_HTTP2_ENABLED=true
      - GATEWAY_OPENAI_HTTP2_ALLOW_PROXY_FALLBACK_TO_HTTP1=true
      - GATEWAY_OPENAI_HTTP2_FALLBACK_ERROR_THRESHOLD=2
      - GATEWAY_OPENAI_HTTP2_FALLBACK_WINDOW_SECONDS=60
      - GATEWAY_OPENAI_HTTP2_FALLBACK_TTL_SECONDS=600
      - GATEWAY_MAX_CONNS_PER_HOST=2048
      - GATEWAY_MAX_IDLE_CONNS=8192
      - GATEWAY_MAX_IDLE_CONNS_PER_HOST=4096

      # =======================================================================
      # Image Generation
      # =======================================================================
      - GATEWAY_IMAGE_STREAM_DATA_INTERVAL_TIMEOUT=900
      - GATEWAY_IMAGE_STREAM_KEEPALIVE_INTERVAL=10
      - GATEWAY_IMAGE_CONCURRENCY_ENABLED=false

      # =======================================================================
      # Dashboard & Ops
      # =======================================================================
      - DASHBOARD_AGGREGATION_ENABLED=true
      - OPS_ENABLED=true

      # =======================================================================
      # Update Proxy (国内访问 GitHub 用)
      # =======================================================================
      - UPDATE_PROXY_URL=${UPDATE_PROXY_URL:-}

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ===========================================================================
  # PostgreSQL Database
  # ===========================================================================
  postgres:
    image: postgres:18-alpine
    container_name: sub2api-postgres
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    environment:
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_USER=${POSTGRES_USER:-sub2api}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-sub2api}
      - TZ=Asia/Shanghai
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sub2api} -d ${POSTGRES_DB:-sub2api}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ===========================================================================
  # Redis Cache
  # ===========================================================================
  redis:
    image: redis:8-alpine
    container_name: sub2api-redis
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - ./redis_data:/data
    command: >
      sh -c '
        redis-server
        --save 60 1
        --appendonly yes
        --appendfsync everysec
        ${REDIS_PASSWORD:+--requirepass "$REDIS_PASSWORD"}'
    environment:
      - TZ=Asia/Shanghai
      - REDISCLI_AUTH=${REDIS_PASSWORD:-}
    networks:
      - sub2api-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

# =============================================================================
# Volumes
# =============================================================================
volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  sub2api-network:
    driver: bridge
